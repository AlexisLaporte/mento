# Main domain
server {
    listen 80;
    server_name mento.cc;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mento.cc;
    ssl_certificate /etc/letsencrypt/live/mento.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mento.cc/privkey.pem;

    root /opt/memento/frontend/dist;

    # Vite build assets (long cache)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Auth routes → Flask
    location /auth/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Global API routes → Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Project-scoped API routes → Flask
    location ~ ^/[a-z0-9-]+/api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA catch-all
    location / {
        try_files $uri /index.html;
    }
}

# Custom domains — catch-all for any domain pointing here
server {
    listen 80 default_server;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything → Flask (handles domain resolution + redirect to /<slug>/)
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

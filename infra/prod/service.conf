[Unit]
Description=Memento docs portal
After=network.target postgresql.service

[Service]
Type=simple
User=root
WorkingDirectory=/opt/memento
EnvironmentFile=/opt/memento/.env
ExecStart=/opt/memento/venv/bin/gunicorn "memento.app:create_app()" --bind 127.0.0.1:5002 --workers 2
Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target
